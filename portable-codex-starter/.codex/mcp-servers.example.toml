# Portable Codex Starter MCP template
# OpenAI Docs and Context7 are now part of the default `.codex/config.toml`.
# Use this file for optional extras only.

# Official OpenAI docs MCP.
[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"

# Context7 MCP.
[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]

# OpenAPI MCP example.
# Use this when API contracts are the source of truth.
#[mcp_servers.openapi]
#command = "YOUR_OPENAPI_MCP_COMMAND"
#args = ["..."]

# Postgres MCP example.
# Keep this read-only by default and prefer dev/staging over production.
#[mcp_servers.postgres]
#command = "YOUR_POSTGRES_MCP_COMMAND"
#args = ["..."]

# Chrome DevTools MCP example.
# Good third default if you do frontend or browser debugging.
#[mcp_servers.chrome_devtools]
#url = "http://localhost:3000/mcp"
#startup_timeout_sec = 20

# Markitdown example.
# Good third default if you do document-heavy analysis instead of browser debugging.
#[mcp_servers.markitdown]
#command = "YOUR_MARKITDOWN_COMMAND"
#args = ["..."]
